spring.application.name=portfolio
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:portfoliodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# H2 console (for local debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# CORS allowed origins for the React dev server and prod site
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://anshrai.in,https://www.anshrai.in

# Gmail SMTP configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Contact form email routing
app.contact.mail.from=${CONTACT_MAIL_FROM:${MAIL_USERNAME:}}
app.contact.mail.to=${CONTACT_MAIL_TO:${MAIL_USERNAME:}}
