spring.application.name=portfolio
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:portfoliodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# H2 console (for local debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# CORS allowed origins for the React dev server and prod site
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://anshrai.in,https://www.anshrai.in

# Resend API configuration
app.contact.mail.api-key=${RESEND_API_KEY:}
app.contact.mail.from=${CONTACT_MAIL_FROM:}
app.contact.mail.to=${CONTACT_MAIL_TO:}

# Landing visit JSON storage
app.visitor-log.json-file=${VISITOR_LOG_JSON_FILE:logs/landing-visits.json}
